[tox]
envlist = py310, py311, py312, py313, py314
isolated_build = true

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest --capture=sys \
        --junit-xml=coverage/test-results-{envname}.xml \
        --cov=collector_to_emulator \
        --cov-report term-missing \
        --cov-report xml:coverage/coverage-{envname}.xml \
        --cov-report html:coverage/coverage-{envname}.html \
        --cov-report lcov:coverage/coverage-{envname}.info
